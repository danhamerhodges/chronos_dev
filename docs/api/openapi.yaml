          updated_at: "2026-03-08T00:00:20+00:00"
          completed_at: "2026-03-08T00:00:20+00:00"
      properties:
        upload_id:
          type: string
        status:
          type: string
          enum: [pending, uploading, completed, failed]
        original_filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        checksum_sha256:
          type: string
        bucket_name:
          type: string
        object_path:
          type: string
        media_uri:
          type: string
        resumable_session_url:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        completed_at:
          type: string
    UploadResumeResponse:
