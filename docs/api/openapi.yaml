openapi: 3.1.0
info:
  title: ChronosRefine API
  version: 0.2.0
  description: >
    Phase 2 foundation plus Phase 3 Packets 3A, 3B, and 3C covering ENG-001,
    ENG-002, ENG-003, ENG-004, ENG-005, ENG-006, ENG-007, ENG-008,
    ENG-009, ENG-010, ENG-011, ENG-012, FR-002, NFR-002, NFR-007,
    OPS-003, and SEC-009.
servers:
  - url: https://api.chronosrefine.example
    description: Production placeholder
  - url: http://localhost:8000
    description: Local development
tags:
  - name: health
  - name: metrics
  - name: version
  - name: uploads
  - name: era-detection
  - name: jobs
  - name: manifests
  - name: ops
  - name: users
  - name: security
  - name: testing
paths:
  /health:
    get:
      tags: [health]
      summary: Shallow infrastructure probe
      responses:
        "200":
          description: Service reachable
  /v1/health:
    get:
      tags: [health]
      summary: Detailed service health
      responses:
        "200":
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/metrics:
    get:
      tags: [metrics]
      summary: Prometheus-compatible service metrics
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
  /v1/version:
    get:
      tags: [version]
      summary: Build metadata
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/upload:
    post:
      tags: [uploads]
      summary: Create an authenticated resumable upload session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadCreateRequest"
      responses:
        "200":
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Invalid upload metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "413":
          description: Upload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "415":
          description: Unsupported media format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Upload session creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}:
    patch:
      tags: [uploads]
      summary: Finalize an authenticated upload session
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFinalizeRequest"
      responses:
        "200":
          description: Upload finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Finalized metadata does not match the upload session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Uploaded object not yet available for finalization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Upload finalization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}/resume:
    post:
      tags: [uploads]
      summary: Probe or regenerate an authenticated resumable upload session
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload session ready to resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResumeResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Upload session probe or regeneration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}/detect-era:
    post:
      tags: [uploads]
      summary: Detect era for a finalized upload without creating a media job
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDetectEraRequest"
      responses:
        "200":
          description: Upload-scoped era detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDetectEraResponse"
        "400":
          description: Validation or override failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Upload must be finalized before detection can run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Detection persistence failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}/configuration:
    patch:
      tags: [uploads]
      summary: Save a launch-ready fidelity configuration for a finalized upload
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadConfigurationRequest"
      responses:
        "200":
          description: Launch-ready configuration persisted for later job submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadConfigurationResponse"
        "400":
          description: Validation or configuration mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Upload must be finalized before configuration can be saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Configuration persistence failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/fidelity-tiers:
    get:
      tags: [fidelity]
      summary: Canonical fidelity tiers, personas, and current saved preferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fidelity tier catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FidelityTierCatalogResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/eras:
    get:
      tags: [era-detection]
      summary: Supported eras
      responses:
        "200":
          description: Era catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EraCatalogResponse"
  /v1/detect-era:
    post:
      tags: [era-detection]
      summary: Detect era from media plus era profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectEraRequest"
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectEraResponse"
        "400":
          description: Schema validation or request failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/users/me:
    get:
      tags: [users]
      summary: Current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
    patch:
      tags: [users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
  /v1/jobs:
    post:
      tags: [jobs]
      summary: Submit an async restoration job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "202":
          description: Job accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCreateResponse"
    get:
      tags: [jobs]
      summary: List async jobs for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
  /v1/jobs/{job_id}:
    get:
      tags: [jobs]
      summary: Get job status, progress, and segment details
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetailResponse"
        "404":
          description: Job not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    delete:
      tags: [jobs]
      summary: Request cooperative cancellation for an async job
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCancelResponse"
  /v1/jobs/{job_id}/uncertainty-callouts:
    get:
      tags: [jobs]
      summary: List structured uncertainty callouts for the current user's job
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Structured uncertainty callouts for Packet 4C
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobUncertaintyCalloutsResponse"
        "404":
          description: Job not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/manifests/{job_id}:
    get:
      tags: [manifests]
      summary: Download the transformation manifest for a completed or partial job
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transformation manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationManifestResponse"
        "404":
          description: Manifest not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/ops/runtime:
    get:
      tags: [ops]
      summary: Get the admin runtime operations snapshot
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runtime operations snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeOpsSnapshotResponse"
        "403":
          description: Missing ops permission
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/users/me/usage:
    get:
      tags: [users]
      summary: Current usage and overage posture
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usage snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
  /v1/users/me/approve-overage:
    post:
      tags: [users]
      summary: Approve overage for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverageApprovalRequest"
      responses:
        "200":
          description: Overage approval accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverageApprovalResponse"
  /v1/orgs/{org_id}/settings/logs:
    patch:
      tags: [security]
      summary: Update org log-retention and redaction settings
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogSettingsUpdateRequest"
      responses:
        "200":
          description: Log settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogSettingsResponse"
        "403":
          description: Missing logs:write permission
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/user/delete_logs:
    post:
      tags: [security]
      summary: Submit a GDPR log-deletion request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteLogsRequest"
      responses:
        "200":
          description: Deletion request completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLogsResponse"
  /v1/testing/reset-rate-limits:
    post:
      tags: [testing]
      summary: Reset per-user rate limits in test mode
      description: Mounted only when `TEST_AUTH_OVERRIDE` is enabled and `ENVIRONMENT=test`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rate limit buckets cleared
        "401":
          description: Missing or invalid bearer token
        "404":
          description: Testing helpers disabled outside test mode
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ProblemDetail:
      type: object
      required: [title, status, detail]
      properties:
        type:
          type: string
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        request_id:
          type: string
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
    HealthResponse:
      type: object
      required: [status, components, timestamp]
      properties:
        status:
          type: string
        components:
          type: object
          additionalProperties:
            type: string
        timestamp:
          type: string
    VersionResponse:
      type: object
      required: [version, build_sha, build_time]
      properties:
        version:
          type: string
        build_sha:
          type: string
        build_time:
          type: string
    UploadCreateRequest:
      type: object
      required: [original_filename, mime_type, size_bytes]
      properties:
        original_filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        checksum_sha256:
          type: string
    UploadFinalizeRequest:
      type: object
      required: [size_bytes]
      properties:
        size_bytes:
          type: integer
        checksum_sha256:
          type: string
    UploadResponse:
      type: object
      required:
        [upload_id, status, original_filename, mime_type, size_bytes, bucket_name, object_path, media_uri, resumable_session_url, created_at, updated_at]
      examples:
        - upload_id: upload-pending
          status: pending
          original_filename: sample.mov
          mime_type: video/quicktime
          size_bytes: 1048576
          bucket_name: chronos-dev
          object_path: uploads/user-1/upload-pending/sample.mov
          media_uri: gs://chronos-dev/uploads/user-1/upload-pending/sample.mov
          resumable_session_url: https://storage.googleapis.com/upload/resumable/session-pending
          created_at: "2026-03-08T00:00:00+00:00"
          updated_at: "2026-03-08T00:00:00+00:00"
        - upload_id: upload-uploading
          status: uploading
          original_filename: sample.mov
          mime_type: video/quicktime
          size_bytes: 1048576
          bucket_name: chronos-dev
          object_path: uploads/user-1/upload-uploading/sample.mov
          media_uri: gs://chronos-dev/uploads/user-1/upload-uploading/sample.mov
          resumable_session_url: https://storage.googleapis.com/upload/resumable/session-uploading
          created_at: "2026-03-08T00:00:00+00:00"
          updated_at: "2026-03-08T00:00:10+00:00"
        - upload_id: upload-completed
          status: completed
          original_filename: sample.mov
          mime_type: video/quicktime
          size_bytes: 1048576
          bucket_name: chronos-dev
          object_path: uploads/user-1/upload-completed/sample.mov
          media_uri: gs://chronos-dev/uploads/user-1/upload-completed/sample.mov
          resumable_session_url: https://storage.googleapis.com/upload/resumable/session-completed
          created_at: "2026-03-08T00:00:00+00:00"
          updated_at: "2026-03-08T00:00:20+00:00"
          completed_at: "2026-03-08T00:00:20+00:00"
      properties:
        upload_id:
          type: string
        status:
          type: string
          enum: [pending, uploading, completed, failed]
        original_filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        checksum_sha256:
          type: string
        bucket_name:
          type: string
        object_path:
          type: string
        media_uri:
          type: string
        resumable_session_url:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        completed_at:
          type: string
    UploadResumeResponse:
      type: object
      required:
        [upload_id, status, resumable_session_url, next_byte_offset, upload_complete, session_regenerated, object_path, media_uri]
      example:
        upload_id: upload-uploading
        status: uploading
        resumable_session_url: https://storage.googleapis.com/upload/resumable/session-uploading
        next_byte_offset: 524288
        upload_complete: false
        session_regenerated: false
        object_path: uploads/user-1/upload-uploading/sample.mov
        media_uri: gs://chronos-dev/uploads/user-1/upload-uploading/sample.mov
      properties:
        upload_id:
          type: string
        status:
          type: string
          enum: [pending, uploading, completed, failed]
        resumable_session_url:
          type: string
        next_byte_offset:
          type: integer
        upload_complete:
          type: boolean
        session_regenerated:
          type: boolean
        object_path:
          type: string
        media_uri:
          type: string
    UserPersona:
      type: string
      enum: [archivist, filmmaker, prosumer]
    GrainPreset:
      type: string
      enum: [Matched, Subtle, Heavy]
    FidelityTierCatalogItem:
      type: object
      required:
        [tier, label, description, default_grain_preset, allowed_grain_presets, relative_cost_multiplier, relative_processing_time_band, thresholds, identity_lock]
      properties:
        tier:
          type: string
          enum: [Enhance, Restore, Conserve]
        label:
          type: string
        description:
          type: string
        default_grain_preset:
          $ref: "#/components/schemas/GrainPreset"
        allowed_grain_presets:
          type: array
          items:
            $ref: "#/components/schemas/GrainPreset"
        relative_cost_multiplier:
          type: number
        relative_processing_time_band:
          type: string
        thresholds:
          type: object
          additionalProperties:
            type: number
        identity_lock:
          type: boolean
    FidelityPersonaOption:
      type: object
      required: [persona, label, default_fidelity_tier, description]
      properties:
        persona:
          $ref: "#/components/schemas/UserPersona"
        label:
          type: string
        default_fidelity_tier:
          type: string
          enum: [Enhance, Restore, Conserve]
        description:
          type: string
    FidelityTierCatalogResponse:
      type: object
      required: [personas, tiers, grain_presets]
      properties:
        personas:
          type: array
          items:
            $ref: "#/components/schemas/FidelityPersonaOption"
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/FidelityTierCatalogItem"
        grain_presets:
          type: array
          items:
            $ref: "#/components/schemas/GrainPreset"
        current_persona:
          $ref: "#/components/schemas/UserPersona"
        preferred_fidelity_tier:
          type: string
          enum: [Enhance, Restore, Conserve]
        preferred_grain_preset:
          $ref: "#/components/schemas/GrainPreset"
    EraCatalogResponse:
      type: object
      required: [eras]
      properties:
        eras:
          type: array
          items:
