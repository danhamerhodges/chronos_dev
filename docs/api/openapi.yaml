openapi: 3.1.0
info:
  title: ChronosRefine API
  version: 0.2.0
  description: >
    Public API contract for ChronosRefine local development and the shared
    chronos_dev hosted validation environment. The hosted runtime operates with
    ENVIRONMENT=staging; production is not active yet.
servers:
  - url: http://localhost:8000
    description: Local development
tags:
  - name: health
  - name: metrics
  - name: version
  - name: uploads
  - name: era-detection
  - name: jobs
  - name: previews
  - name: manifests
  - name: deletion-proofs
  - name: ops
  - name: users
  - name: security
  - name: testing
paths:
  /health:
    get:
      tags: [health]
      summary: Shallow infrastructure probe
      responses:
        "200":
          description: Service reachable
  /v1/health:
    get:
      tags: [health]
      summary: Detailed service health
      responses:
        "200":
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/metrics:
    get:
      tags: [metrics]
      summary: Prometheus-compatible service metrics
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
  /v1/version:
    get:
      tags: [version]
      summary: Build metadata
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/upload:
    post:
      tags: [uploads]
      summary: Create an authenticated resumable upload session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadCreateRequest"
      responses:
        "200":
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Invalid upload metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "413":
          description: Upload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "415":
          description: Unsupported media format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Upload session creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}:
    patch:
      tags: [uploads]
      summary: Finalize an authenticated upload session
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFinalizeRequest"
      responses:
        "200":
          description: Upload finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Finalized metadata does not match the upload session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Uploaded object not yet available for finalization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Upload finalization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}/resume:
    post:
      tags: [uploads]
      summary: Probe or regenerate an authenticated resumable upload session
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload session ready to resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResumeResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Upload session probe or regeneration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}/detect-era:
    post:
      tags: [uploads]
      summary: Detect era for a finalized upload without creating a media job
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDetectEraRequest"
      responses:
        "200":
          description: Upload-scoped era detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadDetectEraResponse"
        "400":
          description: Validation or override failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Upload must be finalized before detection can run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Detection persistence failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/upload/{upload_id}/configuration:
    patch:
      tags: [uploads]
      summary: Save a launch-ready fidelity configuration for a finalized upload
      security:
        - bearerAuth: []
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadConfigurationRequest"
      responses:
        "200":
          description: Launch-ready configuration persisted for later job submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadConfigurationResponse"
        "400":
          description: Validation or configuration mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Caller lacks upload permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Upload session not found for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Upload must be finalized before configuration can be saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          description: Configuration persistence failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/fidelity-tiers:
    get:
      tags: [fidelity]
      summary: Canonical fidelity tiers, personas, and current saved preferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fidelity tier catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FidelityTierCatalogResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/eras:
    get:
      tags: [era-detection]
      summary: Supported eras
      responses:
        "200":
          description: Era catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EraCatalogResponse"
  /v1/detect-era:
    post:
      tags: [era-detection]
      summary: Detect era from media plus era profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectEraRequest"
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectEraResponse"
        "400":
          description: Schema validation or request failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          description: Missing or invalid bearer token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "429":
          description: Rate limit exceeded
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/users/me:
    get:
      tags: [users]
      summary: Current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
    patch:
      tags: [users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
  /v1/jobs:
    post:
      tags: [jobs]
      summary: Submit an async restoration job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "202":
          description: Job accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCreateResponse"
        "503":
          description: Billing pricing metadata is temporarily unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    get:
      tags: [jobs]
      summary: List async jobs for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
  /v1/jobs/estimate:
    post:
      tags: [jobs]
      summary: Estimate launch-time usage and cost for an async restoration job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "200":
          description: Launch-time usage and cost estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEstimateResponse"
        "503":
          description: Billing pricing metadata is temporarily unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/previews:
    post:
      tags: [previews]
      summary: Create or reuse a draft preview session from the latest saved upload configuration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewCreateRequest"
      responses:
        "200":
          description: Preview session ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewSessionResponse"
        "404":
          description: Upload session not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Upload is incomplete or the latest saved Packet 4B configuration is missing
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "503":
          description: Preview storage/signing or billing pricing metadata is temporarily unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/previews/{preview_id}:
    get:
      tags: [previews]
      summary: Reread an existing owner-scoped preview session
      security:
        - bearerAuth: []
      parameters:
        - name: preview_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preview session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewSessionResponse"
        "404":
          description: Preview session not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "410":
          description: Preview session expired and its artifacts were deleted
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: /problems/preview_expired
                title: Preview Expired
                status: 410
                detail: The preview session has expired and its artifacts were deleted. Generate a fresh preview from the saved configuration.
        "503":
          description: Preview storage/signing is temporarily unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/previews/{preview_id}/review:
    post:
      tags: [previews]
      summary: Approve or reject the current owner-scoped preview before launch
      security:
        - bearerAuth: []
      parameters:
        - name: preview_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewReviewRequest"
      responses:
        "200":
          description: Preview review state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewSessionResponse"
        "404":
          description: Preview session not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Preview is stale or already launched
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                preview_stale:
                  value:
                    type: /problems/preview_stale
                    title: Preview Stale
                    status: 409
                    detail: The preview no longer matches the latest saved configuration. Regenerate the preview and retry.
                preview_already_launched:
                  value:
                    type: /problems/preview_already_launched
                    title: Preview Already Launched
                    status: 409
                    detail: This preview has already been launched and cannot be reviewed again.
        "410":
          description: Preview session expired and its artifacts were deleted
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: /problems/preview_expired
                title: Preview Expired
                status: 410
                detail: The preview session has expired and its artifacts were deleted. Generate a fresh preview from the saved configuration.
  /v1/previews/{preview_id}/launch:
    post:
      tags: [previews]
      summary: Launch processing from the approved current preview
      security:
        - bearerAuth: []
      parameters:
        - name: preview_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewLaunchRequest"
      responses:
        "202":
          description: Preview launch accepted and bound to a deterministic job id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCreateResponse"
        "404":
          description: Preview session not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Preview is not approved, is stale, or was already launched
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              examples:
                preview_approval_required:
                  value:
                    type: /problems/preview_approval_required
                    title: Preview Approval Required
                    status: 409
                    detail: Approve the current preview before launching processing.
                preview_stale:
                  value:
                    type: /problems/preview_stale
                    title: Preview Stale
                    status: 409
                    detail: The preview no longer matches the latest saved configuration. Regenerate the preview and retry.
                preview_already_launched:
                  value:
                    type: /problems/preview_already_launched
                    title: Preview Already Launched
                    status: 409
                    detail: This preview has already been launched and cannot be reviewed again.
        "410":
          description: Preview session expired and its artifacts were deleted
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: /problems/preview_expired
                title: Preview Expired
                status: 410
                detail: The preview session has expired and its artifacts were deleted. Generate a fresh preview from the saved configuration.
        "503":
          description: Launch claim persisted, but dispatch did not complete
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: /problems/launch_dispatch_failed
                title: Launch Dispatch Failed
                status: 503
                detail: Preview launch was claimed, but dispatch did not complete. Retry the same preview launch to reuse the existing job binding.
  /v1/jobs/{job_id}:
    get:
      tags: [jobs]
      summary: Get job status, progress, and segment details
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetailResponse"
        "404":
          description: Job not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    delete:
      tags: [jobs]
      summary: Request cooperative cancellation for an async job
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCancelResponse"
  /v1/jobs/{job_id}/uncertainty-callouts:
    get:
      tags: [jobs]
      summary: List structured uncertainty callouts for the current user's job
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Structured uncertainty callouts for Packet 4C
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobUncertaintyCalloutsResponse"
        "404":
          description: Job not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/jobs/{job_id}/export:
    get:
      tags: [jobs]
      summary: Generate a fresh signed download URL for a completed or partial job export package
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: variant
          in: query
          required: false
          schema:
            type: string
            enum: [av1, h264]
            default: av1
        - name: retention_days
          in: query
          required: false
          description: Default is 7 days. Non-Museum plans may request 1 to 7 days; Museum may request 1 to 90 days.
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 7
      responses:
        "200":
          description: Signed output-delivery package URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExportResponse"
        "403":
          description: Extended retention requires Museum tier
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Job or package not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Export package not ready because the job has not reached a successful terminal state
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "410":
          description: Export package expired and has been deleted
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/manifests/{job_id}:
    get:
      tags: [manifests]
      summary: Download the transformation manifest for a completed or partial job
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transformation manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransformationManifestResponse"
        "404":
          description: Manifest not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/deletion-proofs/{proof_id}:
    get:
      tags: [deletion-proofs]
      summary: Get the signed deletion-proof PDF metadata for a delivered job
      security:
        - bearerAuth: []
      parameters:
        - name: proof_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion-proof metadata and a fresh signed PDF URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletionProofResponse"
        "404":
          description: Deletion proof not found for the current user
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/ops/runtime:
    get:
      tags: [ops]
      summary: Get the admin runtime operations snapshot
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runtime operations snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeOpsSnapshotResponse"
        "403":
          description: Missing ops permission
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/ops/costs:
    get:
      tags: [ops]
      summary: Cost monitoring snapshot
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cost monitoring snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostOpsSnapshotResponse"
        "403":
          description: Missing ops permission
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "503":
          description: Billing pricing metadata is temporarily unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/users/me/usage:
    get:
      tags: [users]
      summary: Current usage and overage posture
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usage snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
  /v1/users/me/approve-overage:
    post:
      tags: [users]
      summary: Approve overage for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverageApprovalRequest"
      responses:
        "200":
          description: Overage approval accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverageApprovalResponse"
  /v1/orgs/{org_id}/settings/logs:
    patch:
      tags: [security]
      summary: Update org log-retention and redaction settings
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogSettingsUpdateRequest"
      responses:
        "200":
          description: Log settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogSettingsResponse"
        "403":
          description: Missing logs:write permission
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /v1/user/delete_logs:
    post:
      tags: [security]
      summary: Submit a GDPR log-deletion request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteLogsRequest"
      responses:
        "200":
          description: Deletion request completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLogsResponse"
  /v1/testing/reset-rate-limits:
    post:
      tags: [testing]
      summary: Reset per-user rate limits in test mode
      description: Mounted only when `TEST_AUTH_OVERRIDE` is enabled and `ENVIRONMENT=test`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rate limit buckets cleared
        "401":
          description: Missing or invalid bearer token
        "404":
          description: Testing helpers disabled outside test mode
