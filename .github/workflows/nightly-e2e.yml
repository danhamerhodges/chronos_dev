name: nightly-e2e

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  nightly-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          npm ci
          npm --prefix web ci
      - name: Nightly validation baseline
        run: |
          pytest tests/design_system tests/visual_regression -q
          ./node_modules/.bin/pnpm -C web test
