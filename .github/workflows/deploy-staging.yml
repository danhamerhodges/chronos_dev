name: deploy-staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: chronos_dev # Shared hosted staging / pre-prod environment.
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
      STRIPE_BILLING_PORTAL_RETURN_URL: ${{ secrets.STRIPE_BILLING_PORTAL_RETURN_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate required deploy secrets
        run: |
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_WIF_PROVIDER}"
          test -n "${GCP_DEPLOY_SERVICE_ACCOUNT}"
          test -n "${CLOUD_RUN_SERVICE}"
          test -n "${GCS_BUCKET_NAME}"
          test -n "${STRIPE_BILLING_PORTAL_RETURN_URL}"
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Validate required hosted Secret Manager secrets
        run: |
          for secret in \
            REDIS_URL \
            SUPABASE_URL_DEV \
            SUPABASE_ANON_KEY_DEV \
            SUPABASE_SERVICE_ROLE_KEY \
            STRIPE_SECRET_KEY \
            STRIPE_WEBHOOK_SECRET \
            COMMERCIAL_PRICEBOOK_JSON \
            STRIPE_PRODUCT_ID \
            STRIPE_PRICE_ID \
            STRIPE_HOBBYIST_PRICE_ID \
            STRIPE_PRO_PRICE_ID \
            STRIPE_MUSEUM_PRICE_ID \
            STRIPE_OVERAGE_PRODUCT_ID \
            STRIPE_OVERAGE_PRICE_ID \
            SUPABASE_DB_HOST \
            SUPABASE_DB_PORT \
            SUPABASE_DB_NAME \
            SUPABASE_DB_USER \
            SUPABASE_DB_PASSWORD \
            JOB_WORKER_TRUSTED_TOKEN \
            OUTPUT_DELIVERY_SIGNING_SECRET; do
            gcloud secrets describe "${secret}" --project "${GCP_PROJECT_ID}" >/dev/null || {
              echo "Missing required Secret Manager secret for chronos_dev: ${secret}"
              exit 1
            }
          done
      - name: Deploy to Cloud Run staging
        run: |
          eval "$(bash scripts/ops/emit_build_metadata.sh)"
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION:-us-central1}" \
            --source . \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=staging,BUILD_SHA=${BUILD_SHA},BUILD_TIME=${BUILD_TIME},JOB_DISPATCH_MODE=pubsub,JOB_PROGRESS_MODE=supabase,JOB_PUBSUB_TOPIC=projects/${GCP_PROJECT_ID}/topics/chronos-async-jobs-smoke,SEGMENT_CACHE_MODE=redis,GCS_BUCKET_NAME=${GCS_BUCKET_NAME},COMMERCIAL_PRICEBOOK_BOOTSTRAP_ENABLED=true,STRIPE_BILLING_PORTAL_RETURN_URL=${STRIPE_BILLING_PORTAL_RETURN_URL}" \
            --set-secrets "REDIS_URL=REDIS_URL:latest,SUPABASE_URL=SUPABASE_URL_DEV:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY_DEV:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,COMMERCIAL_PRICEBOOK_JSON=COMMERCIAL_PRICEBOOK_JSON:latest,STRIPE_PRODUCT_ID=STRIPE_PRODUCT_ID:latest,STRIPE_PRICE_ID=STRIPE_PRICE_ID:latest,STRIPE_HOBBYIST_PRICE_ID=STRIPE_HOBBYIST_PRICE_ID:latest,STRIPE_PRO_PRICE_ID=STRIPE_PRO_PRICE_ID:latest,STRIPE_MUSEUM_PRICE_ID=STRIPE_MUSEUM_PRICE_ID:latest,STRIPE_OVERAGE_PRODUCT_ID=STRIPE_OVERAGE_PRODUCT_ID:latest,STRIPE_OVERAGE_PRICE_ID=STRIPE_OVERAGE_PRICE_ID:latest,SUPABASE_DB_HOST=SUPABASE_DB_HOST:latest,SUPABASE_DB_PORT=SUPABASE_DB_PORT:latest,SUPABASE_DB_NAME=SUPABASE_DB_NAME:latest,SUPABASE_DB_USER=SUPABASE_DB_USER:latest,SUPABASE_DB_PASSWORD=SUPABASE_DB_PASSWORD:latest,JOB_WORKER_TRUSTED_TOKEN=JOB_WORKER_TRUSTED_TOKEN:latest,OUTPUT_DELIVERY_SIGNING_SECRET=OUTPUT_DELIVERY_SIGNING_SECRET:latest" \
            --quiet
      - name: Verify Cloud Run runtime hardening
        run: |
          python3 scripts/ops/verify_cloud_run_runtime.py \
            --service "${CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION:-us-central1}"
      - name: Smoke check staging health endpoint
        run: |
          SERVICE_URL="$(gcloud run services describe "${CLOUD_RUN_SERVICE}" --project "${GCP_PROJECT_ID}" --region "${GCP_REGION:-us-central1}" --format='value(status.url)')"
          curl --fail --silent --show-error "${SERVICE_URL}/health"
