name: ci

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CHRONOS_RUN_SUPABASE_INTEGRATION: "0"
      CHRONOS_RUN_STRIPE_INTEGRATION: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          npm ci
          npm --prefix web ci
      - name: Validate traceability and structure
        run: |
          python3 scripts/validate_test_traceability.py
          pytest tests/infrastructure tests/database tests/auth tests/billing tests/ops -q
          ./node_modules/.bin/pnpm -C web test
          ./node_modules/.bin/pnpm -C web storybook:test
          pytest tests/design_system tests/visual_regression -q
          pytest -q

  integration:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: chronos_dev
    env:
      CHRONOS_RUN_SUPABASE_INTEGRATION: "1"
      CHRONOS_RUN_STRIPE_INTEGRATION: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL_DEV }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_DEV }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRODUCT_ID: ${{ secrets.STRIPE_SUBSCRIPTION_PRODUCT_ID }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_SUBSCRIPTION_PRICE_ID }}
      STRIPE_BILLING_PORTAL_RETURN_URL: ${{ secrets.STRIPE_BILLING_PORTAL_RETURN_URL }}
      CHRONOS_TEST_EMAIL: ${{ secrets.CHRONOS_TEST_EMAIL }}
      CHRONOS_TEST_PASSWORD: ${{ secrets.CHRONOS_TEST_PASSWORD }}
      CHRONOS_TEST_STRIPE_CUSTOMER_ID: ${{ secrets.CHRONOS_TEST_STRIPE_CUSTOMER_ID }}
      CHRONOS_ENABLE_INTEGRATION_CI: ${{ secrets.CHRONOS_ENABLE_INTEGRATION_CI }}
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - id: integration_gate
        name: Evaluate integration secret readiness
        run: |
          if [ "${CHRONOS_ENABLE_INTEGRATION_CI}" != "1" ]; then
            echo "run_integration=false" >> "$GITHUB_OUTPUT"
            echo "Integration suite disabled (set CHRONOS_ENABLE_INTEGRATION_CI=1 to enable)."
            exit 0
          fi
          echo "Integration suite enabled; validating external service configuration."
          echo "Note: table-level Supabase integration checks require bootstrapped schema in target project."

          missing=0
          for name in SUPABASE_URL SUPABASE_ANON_KEY STRIPE_SECRET_KEY STRIPE_PRODUCT_ID STRIPE_PRICE_ID STRIPE_BILLING_PORTAL_RETURN_URL CHRONOS_TEST_EMAIL CHRONOS_TEST_PASSWORD CHRONOS_TEST_STRIPE_CUSTOMER_ID; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "missing:$name"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "run_integration=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_integration=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.integration_gate.outputs.run_integration == 'true'
        with:
          python-version: "3.12"
      - name: Install dependencies
        if: steps.integration_gate.outputs.run_integration == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run integration-enabled backend tests
        if: steps.integration_gate.outputs.run_integration == 'true'
        run: pytest tests/database tests/auth tests/billing -q
      - name: Integration tests skipped (missing secrets)
        if: steps.integration_gate.outputs.run_integration != 'true'
        run: echo "Integration secrets missing; skipping integration suite."
