name: agent-ci-followup

on:
  workflow_run:
    workflows: [ci, security]
    types: [completed]

jobs:
  triage-failures:
    if: github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Inspect failing checks (advisory)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python3 .agents/skills/gh-fix-ci/scripts/inspect_pr_checks.py --repo "." --pr "$PR_NUMBER" --json > pr_check_diagnostics.json || true

          {
            echo "## CI Follow-up Diagnostics"
            echo "- Source workflow: ${{ github.event.workflow_run.name }}"
            echo "- Conclusion: ${{ github.event.workflow_run.conclusion }}"
            echo "- PR: #$PR_NUMBER"
            echo
            echo '```json'
            cat pr_check_diagnostics.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
