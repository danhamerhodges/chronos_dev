name: agent-pr-validation

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  merge_group:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Agent PR validation summary
        run: python3 scripts/agents/pr_validation_orchestrator.py --write-summary "$GITHUB_STEP_SUMMARY"
